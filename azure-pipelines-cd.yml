trigger: none

pool:
  vmImage: ubuntu-latest

variables:
- group: DevOps-Common

parameters:
- name: imageTag
  displayName: Docker Image Tag
  type: string
  default: latest

stages:

# ============================
# DEV
# ============================
- stage: Deploy_Dev
  displayName: Deploy to Dev

  jobs:
  - deployment: DeployDev
    displayName: Deploy to AKS Dev
    environment: aks-dev

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: HelmInstaller@1
            displayName: Install Helm
            inputs:
              helmVersionToInstall: latest

          - task: Kubernetes@1
            displayName: Login to AKS Dev
            inputs:
              connectionType: Kubernetes Service Connection
              kubernetesServiceEndpoint: aks-dev-connection
              command: login

          - script: |
              helm upgrade --install flask-app ./flask-chart \
                --namespace aks-dev \
                --create-namespace \
                -f ./flask-chart/values-dev.yaml \
                --set image.tag=${{ parameters.imageTag }}
            displayName: Deploy with Helm

          - script: |
              kubectl rollout status deployment/flask-app -n aks-dev
            displayName: Verify Deployment


# ============================
# STAGE
# ============================
- stage: Deploy_Stage
  displayName: Deploy to Stage
  dependsOn: Deploy_Dev
  condition: succeeded()

  jobs:
  - deployment: DeployStage
    displayName: Deploy to AKS Stage
    environment: aks-stage

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: HelmInstaller@1
            displayName: Install Helm
            inputs:
              helmVersionToInstall: latest

          - task: Kubernetes@1
            displayName: Login to AKS Stage
            inputs:
              connectionType: Kubernetes Service Connection
              kubernetesServiceEndpoint: aks-stage-connection
              command: login

          - script: |
              helm upgrade --install flask-app ./flask-chart \
                --namespace aks-stage \
                --create-namespace \
                -f ./flask-chart/values-stage.yaml \
                --set image.tag=${{ parameters.imageTag }}
            displayName: Deploy with Helm

          - script: |
              kubectl rollout status deployment/flask-app -n aks-stage
            displayName: Verify Deployment


# ============================
# PROD
# ============================
- stage: Deploy_Prod
  displayName: Deploy to Prod
  dependsOn: Deploy_Stage
  condition: succeeded()

  jobs:
  - deployment: DeployProd
    displayName: Deploy to AKS Prod
    environment: aks-prod

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: HelmInstaller@1
            displayName: Install Helm
            inputs:
              helmVersionToInstall: latest

          - task: Kubernetes@1
            displayName: Login to AKS Prod
            inputs:
              connectionType: Kubernetes Service Connection
              kubernetesServiceEndpoint: aks-prod-connection
              command: login

          - script: |
              helm upgrade --install flask-app ./flask-chart \
                --namespace aks-prod \
                --create-namespace \
                -f ./flask-chart/values-prod.yaml \
                --set image.tag=${{ parameters.imageTag }}
            displayName: Deploy with Helm

          - script: |
              kubectl rollout status deployment/flask-app -n aks-prod
            displayName: Verify Deployment