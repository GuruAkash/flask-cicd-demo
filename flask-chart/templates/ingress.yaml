apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: flask-ingress

spec:
  ingressClassName: nginx

  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /home
            pathType: Prefix
            backend:
              service:
                name: flask-service
                port:
                  number: {{ .Values.service.port }}