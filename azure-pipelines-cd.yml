trigger: none

pool:
  vmImage: ubuntu-latest

variables:
- group: DevOps-Common

parameters:
- name: imageTag
  displayName: Docker Image Tag
  type: string
  default: latest

stages:
- stage: Deploy_Dev
  displayName: Deploy to Dev

  jobs:
  - deployment: DeployDev

    displayName: Deploy to AKS Dev

    environment: aks-dev

    strategy:
      runOnce:
        deploy:

          steps:
            - checkout: self

            - task: KubernetesManifest@1
              displayName: Deploy to AKS Dev

              inputs:
                action: deploy
                kubernetesServiceConnection: aks-service-connection

                namespace: aks-dev

                manifests: |
                  k8s/deployment.yaml
                  k8s/service.yaml
                  k8s/ingress.yaml

                containers: |
                  gurudocker20/flask-cicd-demo:${{ parameters.imageTag }}